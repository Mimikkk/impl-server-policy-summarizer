services:
  prod-server:
    build:
      context: .
      dockerfile: workspace/apps/server/docker/Dockerfile
    container_name: policy-summarizer-server
    ports:
      - "${SERVER_PUBLISH_PORT:-8080}:8080"
    environment:
      HOST: 0.0.0.0
      PORT: "8080"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-deepseek-r1:8b}
      DATABASE_URL: file:./storage/database.db
      ELI_DOCS_URL: ${ELI_DOCS_URL:-https://api.sejm.gov.pl/eli/openapi/}
    volumes:
      - server-storage:/repo/workspace/apps/server/storage
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - app-network

  prod-ui:
    build:
      context: .
      dockerfile: workspace/apps/ui/docker/Dockerfile
      args:
        CLIENT_SERVER_URL: ${CLIENT_SERVER_URL:-http://localhost:8080}
        CLIENT_ELI_URL: ${CLIENT_ELI_URL:-https://api.sejm.gov.pl/eli}
    container_name: policy-summarizer-ui
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - app-network

  ollama:
    build:
      context: ./workspace/apps/ollama/docker
      dockerfile: Dockerfile
    container_name: policy-summarizer-ollama
    ports:
      - "${OLLAMA_PUBLISH_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  ollama-data:
  server-storage:
